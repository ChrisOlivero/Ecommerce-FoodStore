<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="../../../styles/global.css">
    <link rel="stylesheet" href="../../../styles/forms.css">
    <link rel="stylesheet" href="../../../styles/auth.css">
</head>
<body>
    <div id="container">   
        <form id="formLogin" >

            <h1 id="h1FoodStore">Food Store</h1>

            <p id="pIniciarSesion">Iniciar Sesión</p>

            <label id="idLabelEmail" for="email">Email:</label>
            <input type="email" 
                    id="email" 
                    name="email" 
                    placeholder="tucorreo@ejemplo.com" 
                    required>
            

            <label id="idLabelPassword" for="password">Contraseña:</label>
            <input type="password" 
                    id="password" 
                    name="password" 
                    placeholder="Mínimo 8 caracteres" 
                    minlength="8" 
                    required>
            

            <button type="submit">Ingresar</button>   

            <p id="pieLogin">¿No tenés cuenta? <a href="/src/pages/auth/registro/registro.html">Registrate acá</a></p>
        </form>
        <div id="login-message"></div>
    </div>
    <script type="module" src="/src/pages/auth/login/login.ts"></script>
</body>
</html>
