<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <link rel="stylesheet" href="../../../styles/global.css">
    <link rel="stylesheet" href="../../../styles/forms.css">
    <link rel="stylesheet" href="../../../styles/auth.css">
</head>

<body>
   <div id="container">   
        <form id="formRegistro" >

            <h1 id="h1FoodStore">Food Store</h1>

            <p id="pRegistrarse">Registrarse</p>

            <label for="idNombre">Nombre:</label>
            <input type="nombre" 
                    id="idNombre" 
                    name="nombre" 
                    placeholder="Tu nombre completo" 
                    required>

            <label id="idLabelEmail" for="email">Email:</label>
            <input type="email" 
                    id="email" 
                    name="email" 
                    placeholder="tucorreo@ejemplo.com" 
                    required>
            

            <label id="idLabelPassword" for="password">Contraseña:</label>
            <input type="password" 
                    id="password" 
                    name="password" 
                    placeholder="Mínimo 8 caracteres" 
                    minlength="8" 
                    required>
            

            <button type="submit">Registrarse</button>   

            
        </form>

        <div id="registro-message" style="color:green; margin-top:10px;"></div>
    </div>
    <script type="module" src="/src/pages/auth/registro/registro.ts"></script>

</body>

</html>
